<!DOCTYPE html>
<html>
<head>
  <title>Astrology AI Chat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at 20% 20%, #1b1b3a, #0b0b18 40%, #050510);
    }

    .stars {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0.6;
      animation: floatStars linear infinite;
    }

    @keyframes floatStars {
      from { transform: translateY(0); }
      to { transform: translateY(-100vh); }
    }

    .box {
      width: 420px;
      height: 700px;
      display: flex;
      flex-direction: column;
      background: #1b1b2a;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      z-index: 2;
    }

    .header {
      background: #111;
      color: white;
      text-align: center;
      padding: 10px;
      font-weight: bold;
    }

    /* 🔘 BUTTONS */
    .controls {
      display: flex;
      justify-content: space-between;
      padding: 5px 10px;
      background: #0f0f1a;
    }

    button.small {
      padding: 6px 10px;
      font-size: 12px;
      border: none;
      border-radius: 6px;
      background: #7b5cff;
      color: white;
      cursor: pointer;
    }

    /* 🤖 CHARACTER */
    .character {
      height: 140px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #141428;
    }

    .orb {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle, #7b5cff, #2b1b66);
      position: relative;
      animation: idleBreath 4s infinite ease-in-out;
    }

    @keyframes idleBreath {
      0% { transform: scale(1); box-shadow: 0 0 15px #7b5cff; }
      50% { transform: scale(1.05); box-shadow: 0 0 25px #7b5cff; }
      100% { transform: scale(1); box-shadow: 0 0 15px #7b5cff; }
    }

    .eye {
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 28px;
      box-shadow: 0 0 10px white;
    }

    .eye.left { left: 20px; }
    .eye.right { right: 20px; }

    .mouth {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 6px;
      background: white;
      border-radius: 10px;
      transition: 0.1s;
    }

    .mouth.talking {
      width: 26px;
      height: 16px;
      border-radius: 50%;
      animation: talk 0.15s infinite alternate;
    }

    @keyframes talk {
      from { transform: translateX(-50%) scaleY(0.6); }
      to { transform: translateX(-50%) scaleY(1.2); }
    }

    /* 💬 CHAT */
    #chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      padding: 10px;
      border-radius: 10px;
      max-width: 80%;
      color: white;
      font-size: 14px;
    }

    .user { background: #3b82f6; align-self: flex-end; }
    .bot { background: #2a2a3d; align-self: flex-start; }

    .input-area {
      display: flex;
      padding: 10px;
      background: #111;
    }

    #input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #222;
      color: white;
    }

    .send {
      margin-left: 5px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #7b5cff;
      color: white;
      cursor: pointer;
    }

    /* 🎭 MOOD COLORS */
    .happy { box-shadow: 0 0 25px gold; }
    .calm { box-shadow: 0 0 25px #7b5cff; }
    .angry { box-shadow: 0 0 25px red; }
    .mystic { box-shadow: 0 0 25px cyan; }
  </style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="box">

  <div class="header">🔮 Astrology AI Assistant</div>

  <!-- 🔘 CONTROLS -->
  <div class="controls">
    <button class="small" onclick="toggleVoice()">🔊 Voice</button>
    <button class="small" onclick="toggleRead()">📢 Read Reply</button>
  </div>

  <!-- 🤖 ORB -->
  <div class="character">
    <div class="orb" id="orb">
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="mouth" id="mouth"></div>
    </div>
  </div>

  <div id="chat"></div>

  <div class="input-area">
    <input id="input" placeholder="Ask astrology question..." />
    <button class="send" onclick="send()">Send</button>
  </div>

</div>

<script>

const chat = document.getElementById("chat");
const mouth = document.getElementById("mouth");
const orb = document.getElementById("orb");

let voiceOn = false;
let readOn = false;

/* 🔊 TOGGLE READ */
function toggleRead() {
  readOn = !readOn;
  alert("Read AI: " + (readOn ? "ON" : "OFF"));
}

/* 🔊 VOICE */
function speak(text) {
  if (!readOn) return;

  const utter = new SpeechSynthesisUtterance(text);

  utter.onstart = () => mouth.classList.add("talking");
  utter.onend = () => mouth.classList.remove("talking");

  window.speechSynthesis.speak(utter);
}

/* 💬 MESSAGE */
function add(text, type) {
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  if (type === "bot") {
    setMood(text);
    speak(text);
  }
}

/* 🎭 MOOD SYSTEM */
function setMood(text) {
  orb.classList.remove("happy", "calm", "angry", "mystic");

  text = text.toLowerCase();

  if (text.includes("love") || text.includes("good")) {
    orb.classList.add("happy");
  } 
  else if (text.includes("warning") || text.includes("bad")) {
    orb.classList.add("angry");
  } 
  else if (text.includes("future") || text.includes("destiny")) {
    orb.classList.add("mystic");
  } 
  else {
    orb.classList.add("calm");
  }
}

/* ⏳ typing */
function typing() {
  let div = document.createElement("div");
  div.className = "msg bot";
  div.textContent = "AI is thinking...";
  chat.appendChild(div);
  return div;
}

/* 🚀 SEND */
async function send() {
  let input = document.getElementById("input");
  let text = input.value.trim();
  if (!text) return;

  add(text, "user");
  input.value = "";

  let loader = typing();

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    loader.remove();
    add(data.reply, "bot");

  } catch (err) {
    loader.remove();
    add("❌ Server error", "bot");
  }
}

/* 🌌 STARS */
function createStars() {
  const stars = document.getElementById("stars");

  for (let i = 0; i < 80; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.left = Math.random() * 100 + "vw";
    star.style.top = Math.random() * 100 + "vh";
    star.style.animationDuration = (5 + Math.random() * 10) + "s";
    stars.appendChild(star);
  }
}
createStars();

document.getElementById("input").addEventListener("keydown", e => {
  if (e.key === "Enter") send();
});

</script>

</body>
</html>
